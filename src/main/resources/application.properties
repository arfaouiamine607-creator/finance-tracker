# =============================================================================
# application.properties — Spring Boot Configuration
#
# Controls how the app behaves:
#   - How to connect to PostgreSQL
#   - JWT token settings
#   - Exchange rate API key
#   - Server port
#
# Real credentials go in application-local.properties (gitignored).
# This file stays clean and safe to commit.
# =============================================================================

# =============================================================================
# SERVER
# =============================================================================

# The app runs on port 8080 locally: http://localhost:8080
server.port=8080

# All API routes are prefixed with /api
# e.g. http://localhost:8080/api/auth/login
#      http://localhost:8080/api/transactions
server.servlet.context-path=/api

# =============================================================================
# DATABASE — PostgreSQL connection
#
# URL format: jdbc:postgresql://HOST:PORT/DATABASE_NAME
#   - localhost     = PostgreSQL runs on the same machine (WSL)
#   - 5432          = default PostgreSQL port
#   - finance_tracker = the database created in Phase 1
# =============================================================================

spring.datasource.url=jdbc:postgresql://localhost:5432/finance_tracker
spring.datasource.username=finance_user
spring.datasource.password=
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP connection pool — keeps connections open for reuse (faster than reconnecting each time)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# =============================================================================
# JPA / HIBERNATE
# =============================================================================

# DDL auto — controls what Hibernate does to the schema on startup:
#   update      = add/modify columns as needed, keeps existing data (used in dev)
#   validate    = check schema matches entities, error if not (used in prod)
#   create      = drops and recreates all tables (destroys data)
#   none        = do nothing (use with a migration tool like Flyway in prod)
spring.jpa.hibernate.ddl-auto=update

# Prints the generated SQL to the console — useful during development
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Tells Hibernate to use PostgreSQL-specific SQL syntax
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Makes sure JPA creates the schema before data.sql seed scripts run
spring.jpa.defer-datasource-initialization=true

# =============================================================================
# DATA SEEDING — runs data.sql on startup
# Used to insert the default student categories into the database
# =============================================================================

spring.sql.init.mode=always

# =============================================================================
# JWT — JSON Web Token authentication
# After login, the server issues a signed token.
# The client sends it with every request; the server verifies the signature.
# =============================================================================

# Signing key — must be at least 32 characters long
app.jwt.secret=

# Token validity: 86400000 ms = 24 hours
app.jwt.expiration=86400000

# =============================================================================
# EXCHANGE RATE API — exchangerate-api.com (free tier: 1500 requests/month)
# Used to convert transaction amounts to the user's base currency
# =============================================================================

app.exchange-rate.api-key=
app.exchange-rate.base-url=https://v6.exchangerate-api.com/v6

# =============================================================================
# LOGGING
# =============================================================================

# DEBUG level for my own code during development
logging.level.com.financetracker=DEBUG

# Shows actual SQL parameter values (not just ?) in the console
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# =============================================================================
# JACKSON — JSON serialization
# =============================================================================

# Don't fail if a JSON response from an external API has extra unknown fields
spring.jackson.deserialization.fail-on-unknown-properties=false

# Serialize LocalDate as "2026-06-23" instead of [2026, 6, 23]
spring.jackson.serialization.write-dates-as-timestamps=false
